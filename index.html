<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>el Jimador | Sip For Yourself</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React, ReactDOM, Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        :root { --brand-blue: #00b4e5; }
        
        * { -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--brand-blue);
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        #root {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .agave-grid {
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.15) 1.5px, transparent 0);
            background-size: 40px 40px;
        }

        /* Hardware Accelerated 3D Flip */
        .flip-card { 
            perspective: 1500px;
            width: 100%;
            height: 100%;
        }
        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            transform-style: preserve-3d;
        }
        .flip-card.flipped .flip-card-inner { 
            transform: rotateY(180deg);
        }
        .flip-card-front, .flip-card-back {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 1.5rem;
            display: flex;
            flex-direction: column;
            transform: translateZ(0);
        }
        .flip-card-back { 
            transform: rotateY(180deg) translateZ(1px);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-chat { animation: fadeIn 0.4s ease-out forwards; }
        
        .chat-scroll {
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.2) transparent;
        }
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .legend-glow {
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        /* Optimized Card Sizing for Single Screen */
        .vibe-card-container {
            height: 64dvh;
            max-height: 520px;
        }

        .seal-rotate {
            animation: rotateSeal 20s linear infinite;
        }
        @keyframes rotateSeal {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .typing-dot {
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        @keyframes typing {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useLayoutEffect } = React;
        
        const Icons = {
            Share2: () => <i data-lucide="share-2"></i>,
            RefreshCcw: () => <i data-lucide="refresh-ccw"></i>,
            ChevronRight: () => <i data-lucide="chevron-right"></i>,
            Sparkles: () => <i data-lucide="sparkles"></i>,
            Loader2: () => <i data-lucide="loader-2" className="animate-spin"></i>,
            BookOpen: () => <i data-lucide="book-open"></i>,
            Info: () => <i data-lucide="info"></i>,
            Award: () => <i data-lucide="award"></i>,
            ShieldCheck: () => <i data-lucide="shield-check"></i>
        };

        const LOGO_ASSET = "a-1.svg";
        const BOTTLE_SILVER = "104417750-1-fr.webp";
        const BOTTLE_REPOSADO = "13680750-1-fr_1200x.webp";

        const VIBES = {
            host: {
                name: "THE LEGENDARY HOST",
                description: "Your house is the spot. You're already planning the playlist before anyone's confirmed.",
                legend: "Lekker! When you're around, the vibes are always sharp and the Palomas never stop flowing.",
                serve: "El Jimador Paloma",
                recipe: ["50ml el Jimador Silver", "10ml Fresh Lime Juice", "Grapefruit Soda to top", "Pinch of Salt", "Grapefruit Wedge"],
                bottle: BOTTLE_SILVER,
                tag: "100% AGAVE. 100% HOST."
            },
            connector: {
                name: "THE CREW CONNECTOR",
                description: "You introduced half the crew. You're the reason the gathering happens.",
                legend: "Sharp! You're the glue holding the crew together, making sure everyone belongs at the table.",
                serve: "El Jimador Margarita Jug",
                recipe: ["200ml el Jimador Silver", "100ml Triple Sec", "100ml Lime Juice", "Agave Nectar", "Loads of Ice"],
                bottle: BOTTLE_SILVER,
                tag: "AUTHENTIC CONNECTION."
            },
            storyteller: {
                name: "THE EPIC STORYTELLER",
                description: "A trip to the shops becomes an odyssey when you tell it. Great stories deserve great sips.",
                legend: "Eish, a night with your stories and a smooth Reposado is legendary. Keep them coming!",
                serve: "El Jimador Reposado Neat",
                recipe: ["50ml el Jimador Reposado", "Serve in a neat glass", "Orange wedge side", "Sip slowly between sentences"],
                bottle: BOTTLE_REPOSADO,
                tag: "SIP SLOWLY. TELL IT TRULY."
            },
            provider: {
                name: "THE ULTIMATE PROVIDER",
                description: "You never arrive empty-handed. Extra ice? Snacks? The El Jimador? You've already got it in the bag.",
                legend: "Reliably real! You're the one the crew depends on to bring the ice and the Jimador energy.",
                serve: "El Jimador Blanco & Lime",
                recipe: ["50ml el Jimador Silver", "Fresh Lime squeeze", "Sparkling Water", "Lots of ice"],
                bottle: BOTTLE_SILVER,
                tag: "RELIABLY REAL. 100% AGAVE."
            },
            spark: {
                name: "THE ENERGY SPARK",
                description: "You walk in and the volume goes up. You didn't plan to stay late, but now you're the soul of the celebration.",
                legend: "Moerse energy! You're the spark that turns a casual sit-down into an epic celebration.",
                serve: "El Jimador Spicy Margarita",
                recipe: ["50ml el Jimador Silver", "25ml Lime Juice", "15ml Agave Syrup", "2 Jalapeño Slices", "Chili salt rim"],
                bottle: BOTTLE_SILVER,
                tag: "IGNITE THE MOMENT."
            },
            dj: {
                name: "THE VIBE CURATOR",
                description: "The speaker is your domain. You read the room better than anyone.",
                legend: "The rhythm is yours! You read the room perfectly, one track and one sip at a time.",
                serve: "El Jimador Paloma Twist",
                recipe: ["50ml el Jimador Silver", "Grapefruit Soda", "Splash of Cranberry", "Rosemary sprig"],
                bottle: BOTTLE_SILVER,
                tag: "YOUR SOUND. YOUR SIP."
            },
            keeper: {
                name: "THE HEART KEEPER",
                description: "You're the emotional centre. You check in on everyone and make sure nobody's left out.",
                legend: "True heart! You keep the crew connected and make sure everyone has a seat at the table.",
                serve: "El Jimador Old Fashioned",
                recipe: ["50ml el Jimador Reposado", "2 dashes Bitters", "1 tsp Agave Nectar", "Orange peel twist"],
                bottle: BOTTLE_REPOSADO,
                tag: "DEEP ROOTS. BELONGING."
            }
        };

        const QUESTIONS = [
            { id: 1, text: "Sharp! It's Saturday 4pm. Where are you? 📍", options: [
                { text: "AT HOME PREPPING THE VIBES", type: "host" },
                { text: "ALREADY THERE, ROUND ON ME", type: "spark" },
                { text: "ON MY WAY, JUST SENT THE PIN", type: "connector" },
                { text: "STILL DECIDING ON THE CREW", type: "storyteller" }
            ]},
            { id: 2, text: "The group chat pings: 'Come through.' You... 📱", options: [
                { text: "ARRIVE WHEN VIBE IS PEAKING", type: "spark" },
                { text: "BRING THE ICE AND JIMADOR", type: "provider" },
                { text: "ASK 'WHO'S ALL THERE?' FIRST", type: "keeper" },
                { text: "I SENT THE INVITE ALREADY!", type: "connector" }
            ]},
            { id: 3, text: "Eish, the playlist is a bit flat. You... 🎵", options: [
                { text: "TAKE OVER THE SPEAKER", type: "dj" },
                { text: "REQUEST A TRACK FOR THE CREW", type: "host" },
                { text: "DON'T NOTICE, I'M MID-STORY", type: "storyteller" },
                { text: "HAPPY TO BE WITH THE PEOPLE", type: "keeper" }
            ]},
            { id: 4, text: "Someone brought the 'cheap' stuff. You... 🥃", options: [
                { text: "BRING OUT THE 100% AGAVE", type: "provider" },
                { text: "MAKE A JOKE TO FIX THE VIBE", type: "storyteller" },
                { text: "OFFER A ROUND OF PALOMAS", type: "host" },
                { text: "IT'S ABOUT THE COMPANY", type: "keeper" }
            ]}
        ];

        const Logo = ({ className = "w-48" }) => {
            const [error, setError] = useState(false);
            if (error) return (
                <div className={`flex flex-col items-center justify-center ${className}`}>
                    <span className="text-white font-black italic tracking-tighter text-3xl leading-none uppercase">el Jimador</span>
                </div>
            );
            return <img src={LOGO_ASSET} alt="El Jimador" className={className} onError={() => setError(true)} />;
        };

        const AgavePattern = () => (
            <div className="absolute inset-0 z-0 opacity-[0.12] pointer-events-none agave-grid"></div>
        );

        function App() {
            const [step, setStep] = useState('splash');
            const [currentQuestion, setCurrentQuestion] = useState(0);
            const [scores, setScores] = useState({});
            const [messages, setMessages] = useState([]);
            const [isTyping, setIsTyping] = useState(false);
            const [isGenerating, setIsGenerating] = useState(false);
            const [isFlipped, setIsFlipped] = useState(false);
            const [showEducation, setShowEducation] = useState(false);
            const chatEndRef = useRef(null);
            const scrollContainerRef = useRef(null);

            useLayoutEffect(() => {
                if (scrollContainerRef.current) scrollContainerRef.current.scrollTo(0, 0);
                lucide.createIcons();
            }, [step, isFlipped, showEducation]);

            useEffect(() => {
                if (chatEndRef.current) {
                    chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
                }
                lucide.createIcons();
            }, [messages, isTyping]);

            const startQuiz = () => {
                setStep('chat');
                addBotMessage("Lekker! Everyone brings something to the table. Let's find your vibe.");
                setTimeout(() => showNextQuestion(0), 1000);
            };

            const addBotMessage = (text) => {
                setIsTyping(true);
                setTimeout(() => {
                    setMessages(prev => [...prev, { sender: 'bot', text }]);
                    setIsTyping(false);
                }, 800);
            };

            const showNextQuestion = (index) => {
                if (index < QUESTIONS.length) addBotMessage(QUESTIONS[index].text);
            };

            const finalizeResults = () => {
                setStep('results');
                setIsGenerating(true);
                setTimeout(() => {
                    setIsGenerating(false);
                }, 1200);
            };

            const handleAnswer = (option) => {
                const newScores = { ...scores, [option.type]: (scores[option.type] || 0) + 1 };
                setScores(newScores);
                setMessages(prev => [...prev, { sender: 'user', text: option.text }]);
                
                if (currentQuestion + 1 < QUESTIONS.length) {
                    const nextQ = currentQuestion + 1;
                    setCurrentQuestion(nextQ);
                    setTimeout(() => showNextQuestion(nextQ), 400);
                } else {
                    setIsTyping(true);
                    setTimeout(() => finalizeResults(), 1000);
                }
            };

            const calculateResult = () => {
                const winner = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b, 'host');
                return VIBES[winner];
            };

            const result = step === 'results' ? calculateResult() : null;

            if (step === 'splash') {
                return (
                    <div className="flex-1 flex flex-col items-center justify-between p-8 pt-12 text-center relative overflow-hidden bg-[#00b4e5]">
                        <AgavePattern />
                        <div className="relative z-10 w-full flex justify-center pt-4">
                            <Logo className="w-48 md:w-64" />
                        </div>
                        <div className="relative z-10 max-w-lg py-10">
                            <p className="text-white text-[10px] font-black uppercase tracking-[0.4em] mb-4">A TEQUILA FOR EVERY OCCASION</p>
                            <h1 className="text-white text-5xl md:text-7xl font-black leading-[0.85] uppercase tracking-tighter mb-8 italic">
                                FIND OUT WHAT YOU BRING TO THE TABLE
                            </h1>
                            <button onClick={startQuiz} className="group relative bg-white text-[#00b4e5] px-10 py-5 rounded-full font-black text-xl shadow-2xl active:scale-95 transition-transform flex items-center gap-3 mx-auto uppercase tracking-tighter">
                                SIP FOR YOURSELF <Icons.ChevronRight />
                            </button>
                        </div>
                        <div className="relative z-10 w-full border-t border-white/20 pt-6">
                            <button onClick={() => setShowEducation(true)} className="text-white/70 text-[10px] font-black uppercase tracking-widest flex items-center gap-2 mx-auto">
                                <Icons.Info size={14} /> WHY 100% BLUE AGAVE MATTERS
                            </button>
                        </div>
                    </div>
                );
            }

            if (step === 'chat') {
                const progress = ((currentQuestion + 1) / QUESTIONS.length) * 100;
                return (
                    <div className="flex-1 flex flex-col font-sans relative overflow-hidden bg-[#00b4e5]">
                        <AgavePattern />
                        {/* Header & Progress (No Logo here as requested) */}
                        <div className="bg-[#00b4e5] z-40 w-full shrink-0">
                            <div className="p-4 flex flex-col items-center justify-center gap-1">
                                <span className="text-white text-[10px] font-black uppercase tracking-[0.4em] opacity-60">Vibe Finder</span>
                                <div className="h-1 bg-white/20 w-full max-w-[120px] rounded-full overflow-hidden mt-1">
                                    <div className="h-full bg-white transition-all duration-500" style={{ width: `${progress}%` }}></div>
                                </div>
                            </div>
                        </div>
                        
                        {/* Scrollable Conversation Area */}
                        <div className="flex-1 overflow-y-auto p-4 space-y-6 z-10 relative chat-scroll">
                            <div className="max-w-2xl mx-auto w-full flex flex-col space-y-6">
                                {messages.map((m, i) => (
                                    <div key={i} className={`flex ${m.sender === 'user' ? 'justify-end' : 'justify-start'} animate-chat`}>
                                        <div className={`max-w-[85%] p-4 rounded-2xl ${m.sender === 'user' ? 'bg-white text-[#00b4e5] rounded-tr-none shadow-xl' : 'bg-white/10 text-white border border-white/20 rounded-tl-none backdrop-blur-md'}`}>
                                            <p className="text-sm font-black uppercase leading-tight tracking-wide italic">{m.text}</p>
                                        </div>
                                    </div>
                                ))}
                                {isTyping && (
                                    <div className="flex justify-start">
                                        <div className="bg-white/10 px-4 py-3 rounded-full flex gap-1">
                                            <div className="typing-dot"></div>
                                            <div className="typing-dot" style={{animationDelay: '0.2s'}}></div>
                                            <div className="typing-dot" style={{animationDelay: '0.4s'}}></div>
                                        </div>
                                    </div>
                                )}
                                <div ref={chatEndRef} className="h-4" />
                            </div>
                        </div>

                        {/* Dedicated Answer Tray */}
                        <div className="bg-white/10 backdrop-blur-md border-t border-white/10 z-30 pt-4 pb-8 px-4 shrink-0">
                            <div className="max-w-2xl mx-auto w-full">
                                {!isTyping && currentQuestion < QUESTIONS.length ? (
                                    <div className="flex flex-col gap-2">
                                        {QUESTIONS[currentQuestion].options.map((opt, i) => (
                                            <button key={i} onClick={() => handleAnswer(opt)} className="w-full bg-white text-[#00b4e5] p-4 rounded-xl text-left font-black uppercase tracking-tighter text-sm shadow-xl active:scale-[0.98] transition-all border-2 border-transparent hover:bg-amber-400 hover:text-black">
                                                {opt.text}
                                            </button>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="h-[120px] flex flex-col items-center justify-center gap-3">
                                        <Icons.Loader2 />
                                        <span className="text-[9px] text-white font-black uppercase tracking-[0.3em] opacity-60">Wait for it...</span>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex-1 flex flex-col items-center justify-start p-4 pt-6 relative bg-[#00b4e5] overflow-hidden">
                    <AgavePattern />
                    
                    {showEducation && (
                        <div className="fixed inset-0 z-50 bg-black/60 backdrop-blur-md p-6 flex items-center justify-center">
                            <div className="bg-white rounded-[2rem] p-8 max-w-sm w-full text-center relative shadow-2xl border-4 border-[#00b4e5]">
                                <h3 className="text-[#00b4e5] font-black text-2xl uppercase italic mb-4 tracking-tighter leading-none">THE 100% DIFFERENCE</h3>
                                <p className="text-gray-600 text-xs font-bold uppercase leading-relaxed mb-6 italic tracking-tight">el Jimador is made from 100% real Blue Weber Agave. No fillers. No shortcuts. Just authentic vibes.</p>
                                <button onClick={() => setShowEducation(false)} className="w-full bg-[#00b4e5] text-white font-black py-4 rounded-full uppercase tracking-tighter shadow-lg">SHARP, GOT IT.</button>
                            </div>
                        </div>
                    )}

                    <div className="w-full max-w-sm flex flex-col space-y-4 z-10 h-full">
                        {/* Shorter, High-Character Card */}
                        <div className={`vibe-card-container flip-card ${isFlipped ? 'flipped' : ''}`}>
                            <div className="flip-card-inner">
                                <div className="flip-card-front bg-[#00b4e5] border-[4px] border-white p-6 items-center text-center shadow-2xl relative overflow-hidden">
                                    <div className="absolute inset-0 agave-grid opacity-[0.1] scale-125"></div>
                                    
                                    <div className="flex items-center justify-between w-full z-10 mb-4">
                                        <Logo className="w-16" />
                                        <div className="bg-white/20 p-2 rounded-full seal-rotate backdrop-blur-sm border border-white/20">
                                            <Icons.Award size={14} className="text-white" />
                                        </div>
                                    </div>
                                    
                                    <div className="flex-1 flex flex-col justify-center w-full z-10">
                                        <div className="mb-4">
                                            <p className="text-[8px] font-black uppercase text-white tracking-[0.4em] opacity-80 mb-0.5">CERTIFIED TABLE VIBE</p>
                                            <h2 className="text-4xl font-black leading-[0.8] italic tracking-tighter text-white uppercase drop-shadow-xl">{result.name}</h2>
                                        </div>
                                        
                                        <div className="bg-white/10 backdrop-blur-md p-4 rounded-2xl border border-white/20 shadow-inner relative overflow-hidden mb-4">
                                            {isGenerating ? (
                                                <div className="flex flex-col items-center gap-2 py-2">
                                                    <Icons.Loader2 />
                                                    <span className="text-[8px] uppercase font-black text-white/50 tracking-widest">Identifying...</span>
                                                </div>
                                            ) : (
                                                <p className="text-sm font-black text-white leading-tight italic uppercase px-1 drop-shadow-md text-center">
                                                    "{result.legend}"
                                                </p>
                                            )}
                                        </div>

                                        <div className="relative h-32 flex items-center justify-center">
                                            <div className="absolute w-20 h-20 bg-white/20 rounded-full blur-3xl"></div>
                                            <img src={result.bottle} alt="Bottle" className="h-full object-contain drop-shadow-[0_15px_30px_rgba(0,0,0,0.5)] transform transition-transform z-10" />
                                        </div>
                                    </div>

                                    <div className="mt-auto w-full pt-4 border-t border-white/20 shrink-0 z-10">
                                        <div className="flex flex-col gap-0.5 mb-3">
                                            <p className="text-[7px] font-black text-white/70 uppercase tracking-widest leading-none">SIGNATURE SERVE</p>
                                            <p className="text-lg font-black text-white uppercase italic tracking-tighter leading-none">{result.serve}</p>
                                        </div>
                                        <div className="flex flex-col gap-0.5 items-center">
                                            <p className="text-[18px] font-black italic text-white drop-shadow-lg tracking-tighter uppercase leading-none">SIP FOR YOURSELF.</p>
                                            <p className="text-[5px] text-white/50 font-bold uppercase tracking-[0.2em]">100% AGAVE. Enjoy Responsibly. Not for persons under 18.</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="flip-card-back bg-white border-[4px] border-[#00b4e5] p-6 items-center text-center shadow-2xl relative overflow-hidden">
                                    <div className="absolute inset-0 agave-grid opacity-[0.05] scale-125"></div>
                                    <Logo className="w-12 opacity-30 mb-2 shrink-0" />
                                    <p className="text-[#00b4e5] text-[8px] font-black uppercase tracking-[0.4em] mb-0.5">RECIPE GUIDE</p>
                                    <h2 className="text-[#00b4e5] text-2xl font-black mb-4 italic tracking-tighter uppercase leading-none">{result.serve}</h2>
                                    <div className="flex-1 flex flex-col justify-center space-y-2 w-full z-10 px-2">
                                        {result.recipe.map((step, idx) => (
                                            <div key={idx} className="flex items-center gap-3 text-left">
                                                <div className="w-4 h-4 rounded-full bg-[#00b4e5] text-white text-[9px] font-black flex items-center justify-center flex-shrink-0 shadow-md italic">{idx + 1}</div>
                                                <p className="text-gray-800 text-[9px] font-black uppercase tracking-tight leading-tight italic">{step}</p>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="mt-4 bg-[#00b4e5]/10 p-3 rounded-xl border border-[#00b4e5]/20 shrink-0">
                                        <p className="text-[#00b4e5] text-[8px] font-black italic uppercase tracking-widest leading-tight">"Everyone brings something to the table."</p>
                                    </div>
                                    <p className="mt-4 text-[5px] text-[#00b4e5]/60 font-bold uppercase tracking-widest">Enjoy Responsibly. Not for persons under 18.</p>
                                </div>
                            </div>
                        </div>

                        {/* Action Tray - Now Fits on One Screen */}
                        <div className="grid grid-cols-2 gap-2 px-1 pb-4 shrink-0">
                            <button onClick={() => setIsFlipped(!isFlipped)} className="flex items-center justify-center gap-2 bg-amber-400 text-black p-3.5 rounded-xl font-black shadow-xl uppercase tracking-tighter text-xs active:scale-95 transition-all">
                                <Icons.BookOpen size={14} /> {isFlipped ? 'VIBE' : 'RECIPE'}
                            </button>
                            <button className="flex items-center justify-center gap-2 bg-white text-[#00b4e5] p-3.5 rounded-xl font-black shadow-xl uppercase tracking-tighter text-xs active:scale-95 transition-all">
                                <Icons.Share2 size={14} /> SHARE
                            </button>
                            <button onClick={() => window.location.reload()} className="col-span-2 flex items-center justify-center gap-2 bg-white/10 text-white p-2.5 rounded-xl font-black uppercase tracking-tighter text-[9px] active:scale-95 transition-all border border-white/20">
                                <Icons.RefreshCcw size={10} /> RESTART EXPERIENCE
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
