<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>el Jimador | Sip For Yourself</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React, ReactDOM, Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        :root { --brand-blue: #00b4e5; }
        
        * { -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--brand-blue);
            margin: 0;
            padding: 0;
            width: 100vw;
            /* Removed overflow: hidden and fixed positioning from body to fix mobile cut-offs */
            -webkit-font-smoothing: antialiased;
        }

        #root {
            min-height: 100dvh;
            width: 100%;
        }

        .agave-grid {
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.12) 1.5px, transparent 0);
            background-size: 40px 40px;
        }

        /* Hardware Accelerated 3D Flip */
        .flip-card { 
            perspective: 1500px;
            -webkit-perspective: 1500px;
            width: 100%;
            height: 100%;
        }
        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            transform-style: preserve-3d;
            -webkit-transform-style: preserve-3d;
        }
        .flip-card.flipped .flip-card-inner { 
            transform: rotateY(180deg);
        }
        .flip-card-front, .flip-card-back {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 2.5rem;
            display: flex;
            flex-direction: column;
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
        }
        .flip-card-back { 
            transform: rotateY(180deg) translateZ(1px);
            -webkit-transform: rotateY(180deg) translateZ(1px);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-chat { animation: fadeIn 0.4s ease-out forwards; }
        
        /* Custom scrollbar */
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useLayoutEffect } = React;
        
        const Icons = {
            Share2: () => <i data-lucide="share-2"></i>,
            RefreshCcw: () => <i data-lucide="refresh-ccw"></i>,
            ChevronRight: () => <i data-lucide="chevron-right"></i>,
            Sparkles: () => <i data-lucide="sparkles"></i>,
            Loader2: () => <i data-lucide="loader-2" className="animate-spin"></i>,
            BookOpen: () => <i data-lucide="book-open"></i>,
            Info: () => <i data-lucide="info"></i>
        };

        // Reverted to local assets for reliability
        const LOGO_ASSET = "a-1.svg";
        const BOTTLE_SILVER = "104417750-1-fr.webp";
        const BOTTLE_REPOSADO = "13680750-1-fr_1200x.webp";

        const apiKey = ""; 

        const VIBES = {
            host: {
                name: "THE LEGENDARY HOST",
                description: "Your house is the spot. You're already planning the playlist before anyone's confirmed.",
                serve: "El Jimador Paloma",
                recipe: ["50ml el Jimador Silver", "10ml Fresh Lime Juice", "Grapefruit Soda to top", "Pinch of Salt", "Grapefruit Wedge"],
                bottle: BOTTLE_SILVER,
                tag: "100% AGAVE. 100% HOST."
            },
            connector: {
                name: "THE CREW CONNECTOR",
                description: "You introduced half the crew. You're the reason the gathering happens.",
                serve: "El Jimador Margarita Jug",
                recipe: ["200ml el Jimador Silver", "100ml Triple Sec", "100ml Lime Juice", "Agave Nectar", "Loads of Ice"],
                bottle: BOTTLE_SILVER,
                tag: "AUTHENTIC CONNECTION."
            },
            storyteller: {
                name: "THE EPIC STORYTELLER",
                description: "A trip to the shops becomes an odyssey when you tell it. You turn a casual sit-down into a night to remember.",
                serve: "El Jimador Reposado Neat",
                recipe: ["50ml el Jimador Reposado", "Serve in a neat glass", "Orange wedge side", "Sip slowly between sentences"],
                bottle: BOTTLE_REPOSADO,
                tag: "SIP SLOWLY. TELL IT TRULY."
            },
            provider: {
                name: "THE ULTIMATE PROVIDER",
                description: "You never arrive empty-handed. Extra ice? Snacks? The El Jimador? You've already got it in the bag.",
                serve: "El Jimador Blanco & Lime",
                recipe: ["50ml el Jimador Silver", "Fresh Lime squeeze", "Sparkling Water", "Lots of ice"],
                bottle: BOTTLE_SILVER,
                tag: "RELIABLY REAL. 100% AGAVE."
            },
            spark: {
                name: "THE ENERGY SPARK",
                description: "You walk in and the volume goes up. You're the soul of the celebration.",
                serve: "El Jimador Spicy Margarita",
                recipe: ["50ml el Jimador Silver", "25ml Lime Juice", "Agave Syrup", "Jalapeño Slices", "Chili salt rim"],
                bottle: BOTTLE_SILVER,
                tag: "IGNITE THE MOMENT."
            },
            dj: {
                name: "THE VIBE CURATOR",
                description: "The speaker is your domain. You read the room better than anyone.",
                serve: "El Jimador Paloma Twist",
                recipe: ["50ml el Jimador Silver", "Grapefruit Soda", "Splash of Cranberry", "Rosemary sprig"],
                bottle: BOTTLE_SILVER,
                tag: "YOUR SOUND. YOUR SIP."
            },
            keeper: {
                name: "THE HEART KEEPER",
                description: "You're the emotional centre. You check in on everyone and make sure nobody's left out.",
                serve: "El Jimador Old Fashioned",
                recipe: ["50ml el Jimador Reposado", "2 dashes Bitters", "1 tsp Agave Nectar", "Orange peel twist"],
                bottle: BOTTLE_REPOSADO,
                tag: "DEEP ROOTS. BELONGING."
            }
        };

        const QUESTIONS = [
            { id: 1, text: "Sharp! It's Saturday 4pm. Where are you? 📍", options: [
                { text: "AT HOME PREPPING THE VIBES", type: "host" },
                { text: "ALREADY THERE, ROUND ON ME", type: "spark" },
                { text: "ON MY WAY, JUST SENT THE PIN", type: "connector" },
                { text: "STILL DECIDING ON THE CREW", type: "storyteller" }
            ]},
            { id: 2, text: "The group chat pings: 'Come through.' You... 📱", options: [
                { text: "ARRIVE WHEN VIBE IS PEAKING", type: "spark" },
                { text: "BRING THE ICE AND JIMADOR", type: "provider" },
                { text: "ASK 'WHO'S ALL THERE?' FIRST", type: "keeper" },
                { text: "I SENT THE INVITE ALREADY!", type: "connector" }
            ]},
            { id: 3, text: "Eish, the playlist is a bit flat. You... 🎵", options: [
                { text: "TAKE OVER THE SPEAKER", type: "dj" },
                { text: "REQUEST A TRACK FOR THE CREW", type: "host" },
                { text: "DON'T NOTICE, I'M MID-STORY", type: "storyteller" },
                { text: "HAPPY TO BE WITH THE PEOPLE", type: "keeper" }
            ]},
            { id: 4, text: "Someone brought the 'cheap' stuff. You... 🥃", options: [
                { text: "BRING OUT THE 100% AGAVE", type: "provider" },
                { text: "MAKE A JOKE TO FIX THE VIBE", type: "storyteller" },
                { text: "OFFER A ROUND OF PALOMAS", type: "host" },
                { text: "IT'S ABOUT THE COMPANY", type: "keeper" }
            ]}
        ];

        const callGemini = async (prompt) => {
            let delay = 1000;
            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            contents: [{ parts: [{ text: prompt }] }]
                        })
                    });
                    if (!response.ok) throw new Error('API Error');
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (e) {
                    if (i === 4) throw e;
                    await new Promise(r => setTimeout(r, delay));
                    delay *= 2;
                }
            }
        };

        const Logo = ({ className = "w-48" }) => {
            const [error, setError] = useState(false);
            if (error) return (
                <div className={`flex flex-col items-center justify-center ${className}`}>
                    <span className="text-white font-black italic tracking-tighter text-3xl leading-none">el Jimador</span>
                </div>
            );
            return <img src={LOGO_ASSET} alt="El Jimador" className={className} onError={() => setError(true)} />;
        };

        const AgavePattern = () => (
            <div className="absolute inset-0 z-0 opacity-[0.12] pointer-events-none agave-grid"></div>
        );

        function App() {
            const [step, setStep] = useState('splash');
            const [currentQuestion, setCurrentQuestion] = useState(0);
            const [scores, setScores] = useState({});
            const [messages, setMessages] = useState([]);
            const [isTyping, setIsTyping] = useState(false);
            const [aiLegend, setAiLegend] = useState(null);
            const [isGenerating, setIsGenerating] = useState(false);
            const [isFlipped, setIsFlipped] = useState(false);
            const [showEducation, setShowEducation] = useState(false);
            const chatEndRef = useRef(null);

            // Hardened Scroll to Top Logic
            useLayoutEffect(() => {
                window.scrollTo({ top: 0, behavior: 'instant' });
                const root = document.getElementById('root');
                if (root) root.scrollTo({ top: 0, behavior: 'instant' });
                lucide.createIcons();
            }, [step, isFlipped, showEducation]);

            useEffect(() => {
                if (chatEndRef.current) chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
                lucide.createIcons();
            }, [messages, isTyping]);

            const startQuiz = () => {
                setStep('chat');
                addBotMessage("Lekker! Everyone brings something to the table. Let's find your vibe.");
                setTimeout(() => showNextQuestion(0), 1000);
            };

            const addBotMessage = (text) => {
                setIsTyping(true);
                setTimeout(() => {
                    setMessages(prev => [...prev, { sender: 'bot', text }]);
                    setIsTyping(false);
                }, 800);
            };

            const showNextQuestion = (index) => {
                if (index < QUESTIONS.length) addBotMessage(QUESTIONS[index].text);
                else finalizeResults();
            };

            const finalizeResults = async () => {
                setStep('results');
                const res = calculateResult();
                setIsGenerating(true);
                try {
                    const legend = await callGemini(`Write a cheeky, legendary 1-sentence toast for someone whose table vibe is '${res.name}'. Use authentic South African slang and context. Mention serve: ${res.serve}. Make them feel like the soul of the crew.`);
                    setAiLegend(legend);
                } catch (e) { 
                    setAiLegend("Eish, the vibe is so strong it broke the AI. You're still a legend."); 
                } finally { 
                    setIsGenerating(false); 
                }
            };

            const handleAnswer = (option) => {
                setMessages(prev => [...prev, { sender: 'user', text: option.text }]);
                setScores(prev => ({ ...prev, [option.type]: (prev[option.type] || 0) + 1 }));
                if (currentQuestion + 1 < QUESTIONS.length) {
                    setCurrentQuestion(prev => prev + 1);
                    setTimeout(() => showNextQuestion(currentQuestion + 1), 400);
                } else {
                    setIsTyping(true);
                    setTimeout(() => finalizeResults(), 1000);
                }
            };

            const calculateResult = () => {
                const winner = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b, 'host');
                return VIBES[winner];
            };

            const result = step === 'results' ? calculateResult() : null;

            if (step === 'splash') {
                return (
                    <div className="min-h-[100dvh] flex flex-col items-center justify-between p-8 pt-12 text-center relative overflow-hidden bg-[#00b4e5]">
                        <AgavePattern />
                        <div className="relative z-10 w-full flex justify-center pt-4">
                            <Logo className="w-48 md:w-64" />
                        </div>
                        <div className="relative z-10 max-w-lg py-10">
                            {/* Updated Hero Copy */}
                            <p className="text-white text-[10px] font-black uppercase tracking-[0.4em] mb-4">A TEQUILA FOR EVERY OCCASION</p>
                            <h1 className="text-white text-5xl md:text-7xl font-black leading-[0.85] uppercase tracking-tighter mb-8 italic">
                                FIND OUT WHAT YOU BRING TO THE TABLE
                            </h1>
                            <button onClick={startQuiz} className="group relative bg-white text-[#00b4e5] px-10 py-5 rounded-full font-black text-xl shadow-2xl active:scale-95 transition-transform flex items-center gap-3 mx-auto uppercase tracking-tighter">
                                SIP FOR YOURSELF <Icons.ChevronRight />
                            </button>
                        </div>
                        <div className="relative z-10 w-full border-t border-white/20 pt-6">
                            <button onClick={() => setShowEducation(true)} className="text-white/70 text-[10px] font-black uppercase tracking-widest flex items-center gap-2 mx-auto">
                                <Icons.Info /> WHY 100% BLUE AGAVE MATTERS
                            </button>
                        </div>
                    </div>
                );
            }

            if (step === 'chat') {
                const progress = ((currentQuestion + 1) / QUESTIONS.length) * 100;
                return (
                    <div className="h-[100dvh] flex flex-col font-sans relative overflow-hidden bg-[#00b4e5]">
                        <AgavePattern />
                        <div className="p-4 border-b border-white/10 bg-[#00b4e5] flex items-center justify-center sticky top-0 z-40 w-full shadow-md shrink-0 pt-6">
                            <Logo className="h-8 w-auto" />
                        </div>
                        <div className="h-1 bg-white/10 w-full z-20 shrink-0">
                            <div className="h-full bg-white transition-all duration-500" style={{ width: `${progress}%` }}></div>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 space-y-6 z-10 relative chat-scroll pb-[250px]">
                            {messages.map((m, i) => (
                                <div key={i} className={`flex ${m.sender === 'user' ? 'justify-end' : 'justify-start'} animate-chat`}>
                                    <div className={`max-w-[85%] p-5 rounded-3xl ${m.sender === 'user' ? 'bg-[#007b9d] text-white rounded-tr-none shadow-xl' : 'bg-white text-[#00b4e5] rounded-tl-none shadow-md'}`}>
                                        <p className="text-sm font-bold uppercase leading-tight tracking-tight">{m.text}</p>
                                    </div>
                                </div>
                            ))}
                            {isTyping && <div className="text-[10px] text-white font-black animate-pulse ml-2 uppercase tracking-widest bg-white/20 px-3 py-1 rounded-full inline-block">Jimador is typing...</div>}
                            <div ref={chatEndRef} />
                        </div>
                        {!isTyping && currentQuestion < QUESTIONS.length && (
                            <div className="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-[#00b4e5] via-[#00b4e5] to-transparent z-30 pb-10">
                                {QUESTIONS[currentQuestion].options.map((opt, i) => (
                                    <button key={i} onClick={() => handleAnswer(opt)} className="w-full bg-white text-[#00b4e5] mb-3 p-5 rounded-2xl text-left font-black uppercase tracking-tighter text-lg shadow-2xl active:scale-[0.98] transition-all border-2 border-transparent">
                                        {opt.text}
                                    </button>
                                ))}
                            </div>
                        )}
                    </div>
                );
            }

            return (
                <div className="min-h-[100dvh] p-6 pt-12 flex flex-col items-center relative bg-[#00b4e5]">
                    <AgavePattern />
                    
                    {showEducation && (
                        <div className="fixed inset-0 z-50 bg-black/60 backdrop-blur-md p-6 flex items-center justify-center">
                            <div className="bg-white rounded-[2rem] p-8 max-w-sm w-full text-center relative shadow-2xl">
                                <h3 className="text-[#00b4e5] font-black text-2xl uppercase italic mb-4 tracking-tighter">100% BLUE AGAVE</h3>
                                <p className="text-gray-600 text-sm leading-relaxed mb-6 font-medium italic">el Jimador is made from 100% real Blue Weber Agave. No fillers, no shortcuts—just authentic, smooth tequila that brings the crew together.</p>
                                <button onClick={() => setShowEducation(false)} className="w-full bg-[#00b4e5] text-white font-black py-4 rounded-full uppercase tracking-tighter shadow-lg">SHARP, GOT IT.</button>
                            </div>
                        </div>
                    )}

                    <div className="w-full max-w-md space-y-6 pb-20 relative z-10">
                        <div className={`flip-card w-full aspect-[9/16] ${isFlipped ? 'flipped' : ''}`}>
                            <div className="flip-card-inner">
                                <div className="flip-card-front bg-[#00b4e5] border-4 border-white p-8 items-center text-center">
                                    <Logo className="w-24 mb-4 shrink-0" />
                                    <div className="flex-1 flex flex-col justify-center w-full">
                                        <p className="text-[10px] font-black uppercase text-white tracking-[0.4em] mb-2 opacity-80">YOUR TABLE VIBE</p>
                                        <h2 className="text-4xl font-black mb-4 leading-[0.85] italic tracking-tighter text-white uppercase drop-shadow-2xl">{result.name}</h2>
                                        <div className="bg-white/20 backdrop-blur-xl p-5 rounded-[2rem] border border-white/40 mb-4 min-h-[100px] flex items-center justify-center shadow-inner overflow-hidden">
                                            {isGenerating ? <div className="flex flex-col items-center gap-2"><Icons.Loader2 /><span className="text-[10px] uppercase font-black text-white/70">Personalising Legend...</span></div> : <>
                                                <p className="text-sm font-black text-white leading-tight italic uppercase px-2 drop-shadow">"{aiLegend || result.description}"</p>
                                            </>}
                                        </div>
                                        <div className="flex-1 flex items-center justify-center relative py-4">
                                            <img src={result.bottle} alt="Bottle" className="h-full max-h-[190px] object-contain drop-shadow-[0_15px_30px_rgba(0,0,0,0.5)] transform transition-transform" />
                                        </div>
                                    </div>
                                    <div className="mt-auto w-full pt-4 border-t border-white/40 shrink-0">
                                        <p className="text-[9px] font-black text-white/80 mb-1 uppercase tracking-widest">SIGNATURE SERVE</p>
                                        <p className="text-2xl font-black text-white uppercase italic tracking-tighter leading-none">{result.serve}</p>
                                        <p className="text-[10px] font-black text-white/60 uppercase tracking-widest mt-6 italic">SIP FOR YOURSELF. 100% AGAVE.</p>
                                        <p className="text-[7px] text-white/40 font-bold uppercase mt-2">Enjoy Responsibly. Not for persons under 18.</p>
                                    </div>
                                </div>

                                <div className="flip-card-back bg-white border-4 border-[#00b4e5] p-8 items-center text-center">
                                    <Logo className="w-20 opacity-30 mb-4 shrink-0" />
                                    <p className="text-[#00b4e5] text-[10px] font-black uppercase tracking-[0.4em] mb-1">OWN THE OCCASION</p>
                                    <h2 className="text-[#00b4e5] text-3xl font-black mb-6 italic tracking-tighter uppercase leading-none">{result.serve}</h2>
                                    <div className="flex-1 flex flex-col justify-center space-y-4">
                                        {result.recipe.map((step, idx) => (
                                            <div key={idx} className="flex items-center gap-3 text-left">
                                                <div className="w-6 h-6 rounded-full bg-[#00b4e5] text-white text-[10px] font-black flex items-center justify-center flex-shrink-0">{idx + 1}</div>
                                                <p className="text-gray-700 text-[11px] font-black uppercase tracking-tight leading-tight">{step}</p>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="mt-6 bg-[#00b4e5]/10 p-4 rounded-[1.5rem] border border-[#00b4e5]/20 shrink-0">
                                        <p className="text-[#00b4e5] text-xs font-black italic uppercase tracking-tighter">"Everyone brings something to the table."</p>
                                    </div>
                                    <p className="mt-6 text-[7px] text-[#00b4e5]/60 font-bold uppercase shrink-0">Enjoy Responsibly. Not for persons under 18.</p>
                                </div>
                            </div>
                        </div>

                        <div className="space-y-4">
                            <button onClick={() => setIsFlipped(!isFlipped)} className="w-full flex items-center justify-center gap-3 bg-amber-400 text-black p-5 rounded-2xl font-black shadow-xl uppercase tracking-tighter text-lg active:scale-95 transition-all">
                                <Icons.BookOpen /> {isFlipped ? 'BACK TO VIBE' : 'VIEW RECIPE'}
                            </button>
                            <button className="w-full flex items-center justify-center gap-3 bg-white text-[#00b4e5] p-5 rounded-2xl font-black shadow-xl uppercase tracking-tighter text-lg active:scale-95 transition-all">
                                <Icons.Share2 /> SHARE MY VIBE
                            </button>
                            <button onClick={() => window.location.reload()} className="w-full text-white/70 text-[10px] font-black uppercase flex items-center justify-center gap-2 py-4">
                                <Icons.RefreshCcw /> RESTART EXPERIENCE
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
