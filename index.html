<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>el Jimador | Find Your Archetype</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Trade Gothic Next LT Pro alternative (using similar bold condensed) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&display=swap');
        
        :root { 
            --brand-blue: #00b3c2;
            --brand-black: #212322;
            --brand-white: #fff;
        }
        
        * { -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Oswald', 'Arial Black', sans-serif;
            letter-spacing: -0.02em;
            background-color: var(--brand-blue);
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #root {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-wrapper {
            width: 100%;
            height: 100dvh;
            background-color: var(--brand-blue);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        @media (min-width: 640px) {
            .app-wrapper {
                height: 90vh;
                max-height: 900px;
                max-width: 414px;
                border-radius: 2.5rem;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
                border: 8px solid white;
            }
        }

        .pattern-bg {
            background-image: url('Pattern_patternns.png');
            background-size: cover;
            background-repeat: repeat;
            background-position: center;
            opacity: 0.15;
        }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .animate-chat { animation: fadeIn 0.4s ease-out forwards; }
        
        .chat-scroll {
            scrollbar-width: none;
        }
        .chat-scroll::-webkit-scrollbar { display: none; }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--brand-white);
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        .tab-content {
            animation: fadeIn 0.3s ease-out forwards;
        }

        /* Bold Headline Typography */
        .headline-bold {
            font-weight: 900;
            letter-spacing: -0.03em;
            line-height: 0.95;
        }

        .text-condensed {
            letter-spacing: -0.015em;
            font-weight: 800;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const Icons = {
            Share2: ({size=20, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>,
            RefreshCcw: ({size=20, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M3 2v6h6"/><path d="M21 12A9 9 0 0 0 6 5.3L3 8"/><path d="M21 22v-6h-6"/><path d="M3 12a9 9 0 0 0 15 6.7l3-2.7"/></svg>,
            ChevronRight: ({size=20, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
            Sparkles: ({size=20, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>,
            Loader2: ({size=20, className=""}) => <svg className={`animate-spin ${className}`} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg>,
            Info: ({size=20, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>,
            ShieldCheck: ({size=20, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>,
            Flame: ({size=20, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
        };

        const LOGO_ASSET = "a-1.svg.png";
        const BOTTLE_SILVER = "104417750-1-fr.webp";
        const BOTTLE_REPOSADO = "13680750-1-fr_1200x.webp";

        const VIBES = {
            host: {
                name: "THE LEGENDARY HOST",
                legend: "Lekker! When you're around, the vibes are always sharp and the Palomas never stop flowing.",
                serve: "El Jimador Paloma",
                recipe: ["50ml el Jimador Silver", "10ml Fresh Lime Juice", "Grapefruit Soda to top", "Pinch of Salt", "Grapefruit Wedge"],
                bottle: BOTTLE_SILVER
            },
            connector: {
                name: "THE CREW CONNECTOR",
                legend: "Sharp! You're the glue holding the crew together, making sure everyone belongs at the table.",
                serve: "El Jimador Margarita Jug",
                recipe: ["200ml el Jimador Silver", "100ml Triple Sec", "100ml Lime Juice", "Agave Nectar", "Loads of Ice"],
                bottle: BOTTLE_SILVER
            },
            storyteller: {
                name: "THE EPIC STORYTELLER",
                legend: "Eish, a night with your stories and a smooth Reposado is legendary. Keep them coming!",
                serve: "El Jimador Reposado Neat",
                recipe: ["50ml el Jimador Reposado", "Serve in a neat glass", "Orange wedge side", "Sip slowly between sentences"],
                bottle: BOTTLE_REPOSADO
            },
            provider: {
                name: "THE ULTIMATE PROVIDER",
                legend: "Reliably real! You're the one the crew depends on to bring the ice and the Jimador energy.",
                serve: "El Jimador Blanco & Lime",
                recipe: ["50ml el Jimador Silver", "Fresh Lime squeeze", "Sparkling Water", "Lots of ice"],
                bottle: BOTTLE_SILVER
            },
            spark: {
                name: "THE ENERGY SPARK",
                legend: "Moerse energy! You're the spark that turns a casual sit-down into an epic celebration.",
                serve: "El Jimador Spicy Margarita",
                recipe: ["50ml el Jimador Silver", "25ml Lime Juice", "15ml Agave Syrup", "2 Jalapeño Slices", "Chili salt rim"],
                bottle: BOTTLE_SILVER
            },
            dj: {
                name: "THE VIBE CURATOR",
                legend: "The rhythm is yours! You read the room perfectly, one track and one sip at a time.",
                serve: "El Jimador Paloma Twist",
                recipe: ["50ml el Jimador Silver", "Grapefruit Soda", "Splash of Cranberry", "Rosemary sprig"],
                bottle: BOTTLE_SILVER
            },
            keeper: {
                name: "THE HEART KEEPER",
                legend: "True heart! You keep the crew connected and make sure everyone has a seat at the table.",
                serve: "El Jimador Old Fashioned",
                recipe: ["50ml el Jimador Reposado", "2 dashes Bitters", "1 tsp Agave Nectar", "Orange peel twist"],
                bottle: BOTTLE_REPOSADO
            }
        };

        const QUESTIONS = [
            { id: 1, text: "Sharp! It's Saturday 4pm. Where are you? 📍", options: [
                { text: "AT HOME PREPPING THE VIBES", type: "host" },
                { text: "ALREADY THERE, ROUND ON ME", type: "spark" },
                { text: "ON MY WAY, JUST SENT THE PIN", type: "connector" },
                { text: "STILL DECIDING ON THE CREW", type: "storyteller" }
            ]},
            { id: 2, text: "The group chat pings: 'Come through.' You... 📱", options: [
                { text: "ARRIVE WHEN VIBE IS PEAKING", type: "spark" },
                { text: "BRING THE ICE AND JIMADOR", type: "provider" },
                { text: "ASK 'WHO'S ALL THERE?' FIRST", type: "keeper" },
                { text: "I SENT THE INVITE ALREADY!", type: "connector" }
            ]},
            { id: 3, text: "Eish, the playlist is a bit flat. You... 🎵", options: [
                { text: "TAKE OVER THE SPEAKER", type: "dj" },
                { text: "REQUEST A TRACK FOR THE CREW", type: "host" },
                { text: "DON'T NOTICE, I'M MID-STORY", type: "storyteller" },
                { text: "HAPPY TO BE WITH THE PEOPLE", type: "keeper" }
            ]},
            { id: 4, text: "Someone brought the 'cheap' stuff. You... 🥃", options: [
                { text: "BRING OUT THE 100% AGAVE", type: "provider" },
                { text: "MAKE A JOKE TO FIX THE VIBE", type: "storyteller" },
                { text: "OFFER A ROUND OF PALOMAS", type: "host" },
                { text: "IT'S ABOUT THE COMPANY", type: "keeper" }
            ]}
        ];

        const Logo = ({ className = "w-48" }) => {
            const [error, setError] = useState(false);
            if (error) return (
                <div className={`flex flex-col items-center justify-center ${className}`}>
                    <span className="text-black font-black text-3xl leading-none uppercase headline-bold">el Jimador</span>
                </div>
            );
            return <img src={LOGO_ASSET} alt="El Jimador" className={className} onError={() => setError(true)} />;
        };

        function App() {
            const [step, setStep] = useState('splash');
            const [currentQuestion, setCurrentQuestion] = useState(0);
            const [scores, setScores] = useState({});
            const [messages, setMessages] = useState([]);
            const [isTyping, setIsTyping] = useState(false);
            const [isGenerating, setIsGenerating] = useState(false);
            const [activeTab, setActiveTab] = useState('vibe');
            const [showEducation, setShowEducation] = useState(false);
            const chatEndRef = useRef(null);

            useEffect(() => {
                if (chatEndRef.current) {
                    chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
                }
            }, [messages, isTyping]);

            const startQuiz = () => {
                setStep('chat');
                setIsTyping(true);
                setTimeout(() => {
                    setMessages([{ sender: 'bot', text: "Lekker! Everyone brings something to the table. Let's find your archetype." }]);
                    setIsTyping(false);
                    setTimeout(() => showNextQuestion(0), 600);
                }, 800);
            };

            const addBotMessage = (text) => {
                setIsTyping(true);
                setTimeout(() => {
                    setMessages(prev => [...prev, { sender: 'bot', text }]);
                    setIsTyping(false);
                }, 800);
            };

            const showNextQuestion = (index) => {
                if (index < QUESTIONS.length) addBotMessage(QUESTIONS[index].text);
            };

            const finalizeResults = () => {
                setStep('results');
                setIsGenerating(true);
                setTimeout(() => {
                    setIsGenerating(false);
                }, 1500);
            };

            const handleAnswer = (option) => {
                const newScores = { ...scores, [option.type]: (scores[option.type] || 0) + 1 };
                setScores(newScores);
                setMessages(prev => [...prev, { sender: 'user', text: option.text }]);
                
                if (currentQuestion + 1 < QUESTIONS.length) {
                    const nextQ = currentQuestion + 1;
                    setCurrentQuestion(nextQ);
                    setTimeout(() => showNextQuestion(nextQ), 400);
                } else {
                    setIsTyping(true);
                    setTimeout(() => finalizeResults(), 1000);
                }
            };

            const calculateResult = () => {
                const winner = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b, 'host');
                return VIBES[winner];
            };

            const result = step === 'results' ? calculateResult() : null;

            if (step === 'splash') {
                return (
                    <div className="app-wrapper flex flex-col items-center justify-between p-6 pt-8 text-center relative">
                        <div className="absolute inset-0 pattern-bg"></div>
                        
                        <div className="relative z-10 w-full flex justify-center pt-2">
                            <Logo className="w-40 md:w-48" />
                        </div>

                        <div className="relative z-10 max-w-lg flex-1 flex flex-col justify-center px-4">
                            <h1 className="text-[#212322] text-5xl md:text-6xl font-black leading-[0.9] uppercase mb-6 headline-bold text-condensed">
                                FIND OUT YOUR FRIEND GROUP ARCHETYPE
                            </h1>
                            <p className="text-[#212322]/70 text-sm font-bold uppercase tracking-[0.1em] mb-10">100% AGAVE. 100% REAL.</p>
                            
                            <button onClick={startQuiz} className="bg-black text-[#00b3c2] px-8 py-5 rounded-lg font-black text-lg shadow-2xl active:scale-95 transition-transform flex items-center gap-3 mx-auto uppercase text-condensed tracking-tight hover:bg-black/90 w-full justify-center">
                                SEE FOR YOURSELF <Icons.ChevronRight size={24} />
                            </button>
                        </div>

                        <div className="relative z-10 w-full border-t border-black/20 pt-4 pb-2">
                            <button onClick={() => setShowEducation(true)} className="text-[#212322]/60 hover:text-[#212322] text-[10px] font-black uppercase tracking-widest flex items-center gap-2 mx-auto transition-colors">
                                <Icons.Info size={14} /> WHY 100% BLUE AGAVE MATTERS
                            </button>
                        </div>

                        {showEducation && (
                            <div className="absolute inset-0 z-50 bg-black/80 backdrop-blur-sm p-6 flex items-center justify-center">
                                <div className="bg-white rounded-2xl p-8 w-full text-center relative shadow-2xl">
                                    <h3 className="text-[#00b3c2] font-black text-2xl uppercase mb-4 headline-bold">100% AGAVE</h3>
                                    <p className="text-[#212322] text-xs font-bold uppercase leading-relaxed mb-6">No fillers. No shortcuts. Just authentic vibes.</p>
                                    <button onClick={() => setShowEducation(false)} className="w-full bg-[#212322] text-white font-black py-4 rounded-lg uppercase text-condensed">GOT IT.</button>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            if (step === 'chat') {
                const progress = ((currentQuestion + 1) / QUESTIONS.length) * 100;
                return (
                    <div className="app-wrapper flex flex-col font-sans relative">
                        <div className="absolute inset-0 pattern-bg"></div>
                        
                        <div className="bg-[#00b3c2] z-40 w-full shrink-0 border-b border-white/10 p-4 flex flex-col items-center">
                            <span className="text-[#212322] text-[10px] font-black uppercase tracking-[0.4em] opacity-70 mb-2">ARCHETYPE QUIZ</span>
                            <div className="h-2 bg-[#212322]/20 w-full max-w-[160px] rounded-full overflow-hidden">
                                <div className="h-full bg-[#212322] transition-all duration-500" style={{ width: `${progress}%` }}></div>
                            </div>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto p-4 space-y-5 z-10 relative chat-scroll">
                            {messages.map((m, i) => (
                                <div key={i} className={`flex ${m.sender === 'user' ? 'justify-end' : 'justify-start'} animate-chat`}>
                                    <div className={`max-w-[85%] p-4 rounded-lg ${m.sender === 'user' ? 'bg-[#212322] text-[#00b3c2] rounded-tr-none shadow-lg' : 'bg-white/20 text-[#212322] border border-[#212322]/20 rounded-tl-none backdrop-blur-md'}`}>
                                        <p className="text-sm font-black uppercase leading-tight tracking-tight text-condensed">{m.text}</p>
                                    </div>
                                </div>
                            ))}
                            {isTyping && (
                                <div className="flex justify-start">
                                    <div className="bg-white/20 border border-[#212322]/20 px-4 py-3 rounded-lg flex gap-2 items-center backdrop-blur-md">
                                        <div className="typing-dot" style={{background: '#212322'}}></div>
                                        <div className="typing-dot" style={{background: '#212322'}}></div>
                                        <div className="typing-dot" style={{background: '#212322'}}></div>
                                    </div>
                                </div>
                            )}
                            <div ref={chatEndRef} className="h-4" />
                        </div>

                        <div className="bg-white/15 backdrop-blur-lg border-t border-white/20 z-30 pt-3 pb-4 px-3 shrink-0">
                            {!isTyping && currentQuestion < QUESTIONS.length ? (
                                <div className="flex flex-col gap-2">
                                    {QUESTIONS[currentQuestion].options.map((opt, i) => (
                                        <button key={i} onClick={() => handleAnswer(opt)} className="w-full bg-[#212322] text-[#00b3c2] p-3 rounded-lg text-left font-black uppercase tracking-tighter text-xs shadow-md active:scale-[0.98] transition-all hover:bg-[#212322]/90">
                                            {opt.text}
                                        </button>
                                    ))}
                                </div>
                            ) : (
                                <div className="h-20 flex flex-col items-center justify-center gap-2">
                                    <Icons.Loader2 size={28} className="text-[#212322]" />
                                    <span className="text-[9px] text-[#212322] font-black uppercase tracking-widest opacity-70">REVEALING YOUR ARCHETYPE...</span>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            return (
                <div className="app-wrapper flex flex-col items-center justify-start p-4 pt-6 relative">
                    <div className="absolute inset-0 pattern-bg"></div>
                    
                    <div className="w-full flex flex-col h-full justify-between z-10 space-y-4">
                        
                        {/* Results Card */}
                        <div className="flex-1 bg-[#00b3c2] border-4 border-[#212322] rounded-2xl shadow-2xl flex flex-col overflow-hidden relative">
                            
                            {/* Card Header */}
                            <div className="flex items-center justify-between w-full z-20 p-5 pb-3">
                                <Logo className="w-12" />
                                <div className="opacity-70">
                                    <Icons.ShieldCheck size={24} className="text-[#212322]" />
                                </div>
                            </div>
                            
                            {/* Tab Content */}
                            <div className="flex-1 flex flex-col justify-center w-full z-20 px-5 pb-4 relative">
                                {isGenerating ? (
                                    <div className="flex flex-col items-center justify-center h-full gap-4">
                                        <Icons.Loader2 size={36} className="text-[#212322]" />
                                        <span className="text-xs font-black text-[#212322] tracking-widest uppercase">CALCULATING YOUR ARCHETYPE...</span>
                                    </div>
                                ) : (
                                    <div className="tab-content flex flex-col h-full justify-between">
                                        {activeTab === 'vibe' ? (
                                            <div className="flex flex-col h-full justify-center">
                                                <div className="mb-3">
                                                    <p className="text-[8px] font-black uppercase text-[#212322] tracking-[0.3em] opacity-60 mb-1">YOUR FRIEND GROUP ROLE</p>
                                                    <h2 className="text-3xl font-black leading-tight text-[#212322] uppercase headline-bold text-condensed">{result.name}</h2>
                                                </div>
                                                
                                                <div className="glass-panel p-3 rounded-lg border border-[#212322]/20 shadow-inner my-3 shrink-0">
                                                    <p className="text-xs font-black text-[#212322] leading-tight uppercase drop-shadow-sm text-center text-condensed">
                                                        "{result.legend}"
                                                    </p>
                                                </div>

                                                <div className="flex-1 relative flex items-center justify-center min-h-[100px]">
                                                    <img src={result.bottle} alt="Bottle" className="h-full object-contain drop-shadow-lg z-10 max-h-[140px]" />
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="flex flex-col h-full justify-center">
                                                <div className="mb-3 text-center">
                                                    <p className="text-[#212322] text-[8px] font-black uppercase tracking-[0.3em] mb-1 opacity-60">YOUR SIGNATURE SERVE</p>
                                                    <h2 className="text-[#212322] text-2xl font-black leading-tight uppercase headline-bold text-condensed">{result.serve}</h2>
                                                </div>
                                                
                                                <div className="bg-[#212322]/10 backdrop-blur p-3 rounded-lg border border-[#212322]/20 shadow-inner space-y-2 mx-1">
                                                    {result.recipe.map((step, idx) => (
                                                        <div key={idx} className="flex items-center gap-2 text-left">
                                                            <div className="w-5 h-5 rounded-full bg-[#212322] text-[#00b3c2] text-[9px] font-black flex items-center justify-center flex-shrink-0 shadow-sm">{idx + 1}</div>
                                                            <p className="text-[#212322] text-[9px] font-bold uppercase tracking-tight">{step}</p>
                                                        </div>
                                                    ))}
                                                </div>
                                                
                                                <div className="mt-3 text-center">
                                                    <Icons.Flame size={18} className="text-orange-600 mx-auto mb-2 opacity-80" />
                                                    <p className="text-[#212322] text-[8px] font-black uppercase tracking-widest leading-tight">PERFECT FOR YOUR CREW MOMENTS</p>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>

                            {/* Tab Buttons */}
                            <div className="mt-auto w-full border-t border-[#212322]/20 z-20 shrink-0 bg-[#212322]/5 backdrop-blur-sm">
                                <div className="flex w-full">
                                    <button 
                                        disabled={isGenerating}
                                        onClick={() => setActiveTab('vibe')} 
                                        className={`flex-1 py-3 text-[9px] font-black tracking-widest transition-colors uppercase text-condensed ${activeTab === 'vibe' ? 'bg-[#212322] text-[#00b3c2]' : 'text-[#212322]/60 hover:text-[#212322]'}`}>
                                        THE ARCHETYPE
                                    </button>
                                    <div className="w-[1px] bg-[#212322]/20"></div>
                                    <button 
                                        disabled={isGenerating}
                                        onClick={() => setActiveTab('serve')} 
                                        className={`flex-1 py-3 text-[9px] font-black tracking-widest transition-colors uppercase text-condensed ${activeTab === 'serve' ? 'bg-[#212322] text-[#00b3c2]' : 'text-[#212322]/60 hover:text-[#212322]'}`}>
                                        THE SERVE
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* Action Buttons */}
                        <div className="shrink-0 flex flex-col gap-2 w-full pb-2">
                            <button className="w-full flex items-center justify-center gap-2 bg-[#212322] text-[#00b3c2] p-4 rounded-lg font-black shadow-lg uppercase tracking-tight text-sm active:scale-95 transition-transform text-condensed hover:bg-[#212322]/90">
                                <Icons.Share2 size={16} /> SHARE MY ARCHETYPE
                            </button>
                            <button onClick={() => window.location.reload()} className="w-full flex items-center justify-center gap-2 bg-white/20 backdrop-blur-sm text-[#212322] border-2 border-[#212322] p-3 rounded-lg font-black uppercase tracking-tight text-[10px] active:scale-95 transition-transform text-condensed">
                                <Icons.RefreshCcw size={12} /> RESTART
                            </button>
                            <p className="text-center text-[7px] text-[#212322]/50 font-bold uppercase tracking-widest pt-2">
                                Enjoy Responsibly. Not for persons under 18.
                            </p>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
